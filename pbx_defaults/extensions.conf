[general]
static=yes
writeprotect=yes
autofallthrough=no

[intercom-logic]
exten => 102,1,NoOp(OneDoorBridge)
same => n,Set(CALLERID(all)=102 <102>)
same => n,Dial(PJSIP/105,30,g)
same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?ok:fail)
same => n(fail),Log(NOTICE, Dial Failed with status: ${DIALSTATUS})
same => n,Hangup()
same => n(ok),Hangup()
