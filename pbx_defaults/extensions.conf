[general]
static=yes
writeprotect=yes
autofallthrough=no

[intercom-logic]
; --- App User Entry (700) ---
exten => 700,1,NoOp(Intercom request from ${CALLERID(num)})
 same => n,Set(GROUP()=active_intercom)
 same => n,Set(CALLERID(all)="OneDoor App" <700>)
 ; Syntax: Tech/Data, type, context, exten, priority
 same => n,Originate(PJSIP/105,exten,intercom-logic,701,1)
 same => n,ConfBridge(intercom_bridge,,app_user)
 same => n,Hangup()

; --- Aiphone Entry (701) ---
exten => 701,1,NoOp(Intercom 105 entering bridge)
 same => n,Set(GROUP()=active_intercom)
 same => n,ConfBridge(intercom_bridge,,aiphone)
 same => n,Hangup()

; --- Global Cleanup ---
exten => h,1,NoOp(Cleanup: Group count is ${GROUP_COUNT(active_intercom)})
 ; Count 2 = You (the hanging up channel) + Aiphone.
 ; This drops the Aiphone when the App user leaves.
 same => n,ExecIf($[${GROUP_COUNT(active_intercom)} == 2]?SoftHangup(PJSIP/105))
 same => n,Hangup()

; Safe target for any errors
exten => 99,1,NoOp(Force Termination)
 same => n,Hangup()


