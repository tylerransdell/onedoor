services:
  onedoor:
    build: .          # still needed until docker repo is built.
#    image: tylerransdell/onedoor:latest  --- not ready yet, must build
    container_name: onedoor
    ports:
      - "8099:8099"   #first number is port you expose to nginx. second is server inside container and should stay 8099.
    volumes:
      - ./config.yaml:/app/config.yaml:ro #server config
      - ./logs:/var/log/intercom:rw #optional
    environment:
      - JWT_SECRET= #any string at least 32 chars
    restart: unless-stopped

  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: go2rtc
#    devices:
#      - /dev/dri:/dev/dri  --- use hardware acceleration if transposing landscape camera
    ports:
      - 8557:8557/tcp #webrtc port, OneDoor to go2rtc tcp is handled in dockernet
      - 8557:8557/udp #webrtc port
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml:ro  #go2rtc config
#    environment:
#      - LIBVA_DRIVER_NAME=iHD -- might be required for intel hardware acceleration if transpose landscape
    restart: unless-stopped
